# Fly.io config for the Curio Go backend.
# Rename `app` to something globally unique before `fly deploy`
# (or let `fly launch` generate one). Region "sin" = Singapore (close to TH).

app = "curio-backend"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
